# GitHub secret scanning exemptions.
#
# `internal/redact/` is the redactor itself: its tests are deliberately seeded
# with strings that LOOK like real provider tokens so the regex assertions are
# meaningful. Every value in those tests is fabricated (random base64 / hex
# bodies, no live secrets). Without this exemption, GitHub Push Protection
# rejects every audit round that touches the redactor's test corpus, and
# secret-scanning alerts add noise that hides genuine leaks elsewhere.
#
# Scope is intentionally narrow: only the redactor's _test.go files are
# excluded, so a real leak that lands in production code under
# `internal/redact/redact.go` (or anywhere else in the repo) is still caught.
paths-ignore:
  - "internal/redact/*_test.go"
