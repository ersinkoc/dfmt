name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions pinned by full 40-char SHA. softprops/action-gh-release
      # is the highest-priority pin: this job has `contents: write` and uploads
      # release artifacts, so a tag rewrite there could swap binaries between
      # build and upload (the in-job sha256sums file would be regenerated by the
      # same compromised step). Bump SHAs during dependency review.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"
          cache: true

      - name: Cross-compile
        env:
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X main.version=${VERSION}"
          build() {
            local os="$1" arch="$2" ext="$3"
            local out="dist/dfmt-${os}-${arch}${ext}"
            echo "building $out"
            GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags "$LDFLAGS" -o "$out" ./cmd/dfmt
          }
          build linux   amd64 ""
          build linux   arm64 ""
          build darwin  amd64 ""
          build darwin  arm64 ""
          build windows amd64 ".exe"
          build windows arm64 ".exe"
          build freebsd amd64 ""

      - name: Checksums
        run: |
          cd dist
          sha256sum * > sha256sums.txt
          cat sha256sums.txt

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            dist/dfmt-*
            dist/sha256sums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
