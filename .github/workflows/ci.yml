name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default the GITHUB_TOKEN to read-only at the workflow level. CI only needs to
# check out, build, and test — no write access. Jobs can still upgrade the
# scope if a future step requires it (none currently do).
permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.24", "1.26"]
    # macOS test suite has pre-existing platform-specific flakes (long $TMPDIR
    # exceeds sun_path limits, test hardcoding of Linux-style paths). Until a
    # dedicated hardening pass lands, macOS failures are informational and do
    # not block the overall workflow. Linux + Windows remain required.
    continue-on-error: ${{ matrix.os == 'macos-latest' }}
    steps:
      # Third-party actions are pinned by full 40-char SHA (with the human tag
      # preserved as a comment) so a tag rewrite cannot retroactively change
      # what the workflow runs. Bump SHAs as part of routine dependency review.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Test
        # `-coverprofile` is cheap (~few percent overhead) so we always
        # produce one. The gate below is gated to a single matrix slot so
        # we don't redundantly check four identical profiles.
        run: go test -coverprofile=cover.out -covermode=atomic ./...

      - name: Coverage gate
        # Only meaningful on one matrix slot — coverage data is identical
        # across OS/Go-version pairs. Pick Linux + the newer Go.
        # Informational mode for now: prints the per-package table and
        # appends a Markdown summary to the run page, but exits 0 even
        # when below target. Flip to `--strict` once the documented
        # CLAUDE.md / AGENTS.md thresholds are met.
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.26'
        run: go run scripts/coverage-gate.go cover.out

      - name: Race detector (non-blocking)
        # Run with -race only on Linux + the newer Go. Race is a v1.0 hard
        # requirement (see ROADMAP.md § CI hardening); start non-blocking
        # so a freshly-surfaced race doesn't immediately gate merges
        # before there's a triage queue. Bump to a required step before
        # tagging v1.0.
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.26'
        continue-on-error: true
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          # Pin the linter version, not just the action. `latest` made
          # CI non-deterministic — a new lint rule landing upstream could
          # turn a previously-green PR red without any change in this
          # repository. Bump alongside ADR review when we want the new
          # rules in. The action (`@v7`) targets the golangci-lint v2.x
          # line, so this version must come from the v2 release series.
          #
          # v2.11.4 is the first v2.x release built against go1.26;
          # v2.4.0 was built with go1.25 and panics with "file requires
          # newer Go version go1.26" when go/types is asked to load any
          # file from a Go-1.26-toolchain workspace (which our Setup-Go
          # step installs). Bumping forward fixes that loader panic and
          # also picks up QF1012 (`Use fmt.Fprintf instead of
          # WriteString(fmt.Sprintf(…))`) — the corresponding
          # cmd/dfmt-bench/tokensaving.go edits land in the same commit.
          version: v2.11.4
          args: --timeout=5m
