version: "2"

linters:
  default: none
  enable:
    - bodyclose
    - dogsled
    - errcheck
    - goconst
    - gocritic
    - gocyclo
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - staticcheck
    - unconvert
  settings:
    # gocyclo threshold raised to 65 to cover the natural complexity of the
    # CLI dispatcher (`runDoctor`, `runMCP`), the MCP protocol switch
    # (`handleToolsCall`), and `splitByShellOperators` (a hand-rolled
    # tokenizer with explicit cases for `&&`, `||`, `|`, `;`, `>`, `<`,
    # quote tracking, and escape handling). Any single condition added to
    # those functions still trips the limit; gratuitous nesting in *new*
    # code does not get a free pass.
    gocyclo:
      min-complexity: 65
    dupl:
      threshold: 150
    goconst:
      min-len: 3
      min-occurrences: 3
    misspell:
      locale: US
    lll:
      line-length: 120
    gocritic:
      enabled-tags:
        - diagnostic
      disabled-checks:
        - ifElseChain
        - captLocal
  exclusions:
    rules:
      # Test files: common OS helpers whose errors are safe to ignore in tests
      - path: _test\.go$
        linters:
          - errcheck
        source: 'os\.(Setenv|Unsetenv|MkdirAll|WriteFile|Remove|RemoveAll|Chmod|Chdir|Create|Truncate|Symlink)\('
      # Test files: defer close/remove patterns
      - path: _test\.go$
        linters:
          - errcheck
        source: 'defer .*\.(Close|Remove)\('
      # Test files: fmt.Fprintf to testing output is safe to ignore
      - path: _test\.go$
        linters:
          - errcheck
        source: 'fmt\.(Fprint|Fprintf|Fprintln)\('
      # Logging helper: Init in package init is intentionally best-effort
      - path: internal/logging/logging\.go$
        linters:
          - errcheck
        source: 'Init\('
      # Logging writer: best-effort write
      - path: internal/logging/logging\.go$
        linters:
          - errcheck
        source: 'w\.Write\('
      # Sandbox permissions: temp file cleanup is best-effort
      - path: internal/sandbox/permissions\.go$
        linters:
          - errcheck
        source: 'defer os\.Remove|tmpfile\.(Close|Sync)\(|os\.Remove\(tmpName\)'
      # Logging: best-effort closer close
      - path: internal/logging/logging\.go$
        linters:
          - errcheck
        source: 'closer\.Close\('
      # Registry: best-effort defer close
      - path: internal/project/registry\.go$
        linters:
          - errcheck
        source: 'defer f\.Close\('
      # Daemon lock: best-effort close/unlock
      - path: internal/daemon/lock\.go$
        linters:
          - errcheck
        source: 'f\.Close\(|unlockFlock\('
      # Client: best-effort body close
      - path: internal/client/client\.go$
        linters:
          - errcheck
        source: 'defer resp\.Body\.Close\('
      # Content store / core index: defer close on file handles is best-effort
      - path: 'internal/content/store\.go$|internal/core/index\.go$|internal/core/index_persist\.go$'
        linters:
          - errcheck
        source: 'defer (f|gz|cf)\.Close\('
      # Test files: single-statement close/write/add/stop/connect/probe/exec/remove
      - path: _test\.go$
        linters:
          - errcheck
        source: '(\w+\.Close\(|\w+\.Write\(|\w+\.Add\(|\w+\.Remove\(|\w+\.Stop\(|\w+\.Connect\(|\w+\.Probe\(|\w+\.Exec\(|\w+\.Close\(|\w+\.writeAll\(|fmt\.Sscanf\()'
      # Test files: deferred close/stop
      - path: _test\.go$
        linters:
          - errcheck
        source: 'defer \w+\.(Close|Stop)\('
      # Benchmark: best-effort exec
      - path: cmd/dfmt-bench/main\.go$
        linters:
          - errcheck
        source: 'sb\.Exec\('
      # Content store tests: PutChunk/PutChunkSet/persistChunkSet are best-effort
      - path: internal/content/store_test\.go$
        linters:
          - errcheck
        source: 'store\.(PutChunk|PutChunkSet|persistChunkSet)\('
      # Core journal tests: Append/WriteString/Checkpoint are best-effort
      - path: 'internal/core/journal_test\.go$'
        linters:
          - errcheck
        source: 'j\.Append\(|f\.WriteString\(|j\.Checkpoint\('
      # Core journal: best-effort file operations
      - path: internal/core/journal\.go$
        linters:
          - errcheck
        source: 'f\.Close\(\)|readFile\.Close\(\)|j\.file\.Seek\('
      # Core ulid: rand.Read errors are negligible for ULIDs
      - path: internal/core/ulid\.go$
        linters:
          - errcheck
        source: 'rand\.Read\('
      # Daemon tests: lock release is best-effort
      - path: internal/daemon/daemon_test\.go$
        linters:
          - errcheck
        source: 'lock1\.Release\('
      # Capture windows: filepath.Walk is best-effort
      - path: internal/capture/fswatch_windows\.go$
        linters:
          - errcheck
        source: 'filepath\.Walk\('
      # CLI tests: WriteString and SaveManifest are best-effort
      - path: internal/cli/cli_test\.go$
        linters:
          - errcheck
        source: 'w\.WriteString\(|setup\.SaveManifest\('
      # Daemon: best-effort file operations
      - path: internal/daemon/daemon\.go$
        linters:
          - errcheck
        source: 'os\.Chmod\(|os\.WriteFile\(|core\.PersistIndex\(|os\.Remove\(|d\.Stop\('
      # Transport socket/tcp: best-effort writes and closes
      - path: 'internal/transport/socket\.go$|internal/transport/tcp\.go$'
        linters:
          - errcheck
        source: 'os\.Chmod\(|defer conn\.Close\(\)|codec\.Write(Error|Response)\(|ln\.Close\(\)'
      # Transport socket tests: server start is best-effort
      - path: internal/transport/socket_test\.go$
        linters:
          - errcheck
        source: 'server\.Start\('
      # Transport HTTP: standard web handler patterns are best-effort
      - path: internal/transport/http\.go$
        linters:
          - errcheck
        source: 'defer r\.Body\.Close\(|json\.NewEncoder\(w\)\.Encode\(|json\.Unmarshal\(|w\.Write\(|ln\.Close\(\)|os\.Remove\(|s\.server\.(Shutdown|Serve)\('
      # Transport JSON-RPC: write is best-effort
      - path: internal/transport/jsonrpc\.go$
        linters:
          - errcheck
        source: 'c\.rw\.Write\('
      # Transport socket: remove is best-effort
      - path: internal/transport/socket\.go$
        linters:
          - errcheck
        source: 'os\.Remove\('
      # Transport MCP: unmarshal is best-effort
      - path: internal/transport/mcp\.go$
        linters:
          - errcheck
        source: 'json\.Unmarshal\('
      # Transport tests: codec write/unmarshal
      - path: internal/transport/.+_test\.go$
        linters:
          - errcheck
        source: 'codec\.Write(Request|Response)\(|json\.Unmarshal\('
      # CLI dispatch: flag parse and best-effort cleanup
      - path: internal/cli/dispatch\.go$
        linters:
          - errcheck
        source: 'fs\.Parse\(args\)|os\.Remove\(|os\.WriteFile\(|fmt\.Scanln\(|setup\.SaveManifest\(|setup\.BackupFile\(|json\.NewEncoder\(writer\)\.Encode\(|writer\.Flush\(|f\.WriteString\(|f\.Close\(\)|json\.Unmarshal\(|d\.Stop\(|fmt\.Sscanf\(|process\.Signal\('
      # Client dispatcher: best-effort file and socket cleanup
      - path: internal/client/client\.go$
        linters:
          - errcheck
        source: 'f\.(WriteString|Close)\(|os\.(MkdirAll|WriteFile|Remove)\(|conn\.Close\(|fmt\.Sscanf\('
      # Client registry: best-effort file operations
      - path: internal/client/registry\.go$
        linters:
          - errcheck
        source: 'os\.(MkdirAll|WriteFile)\(|fmt\.Sscanf\('
      # Client process (Windows): handle close is best-effort
      - path: internal/client/process_windows\.go$
        linters:
          - errcheck
        source: 'syscall\.CloseHandle\('
      # Test files: repeated literals like "tcp" or "windows" are idiomatic, not worth extracting
      - path: _test\.go$
        linters:
          - goconst
      # Client dispatcher: network string repeated a handful of times, not worth a constant
      - path: internal/client/client\.go$
        linters:
          - goconst
        source: '"tcp"'
      # CLI dispatcher: runtime.GOOS comparison literals repeat by necessity
      - path: internal/cli/dispatch\.go$
        linters:
          - goconst
        source: '"windows"'
      # Dashboard HTML: CSS lines are inherently long
      - path: internal/transport/dashboard\.go$
        linters:
          - lll
      # Redact patterns: regexes and test inputs are inherently long
      - path: 'internal/redact/redact\.go$|internal/redact/redact_test\.go$'
        linters:
          - lll
      # Hook messages: warning strings are inherently long
      - path: internal/hook/hook\.go$
        linters:
          - lll
      # Algorithm files: gocritic style checks conflict with algorithmic clarity
      - path: 'internal/core/bm25\.go$|internal/core/trigram\.go$|internal/sandbox/permissions\.go$'
        linters:
          - gocritic
      # golangci-lint v2.1.5 typecheck loader misreads the filename stem as a
      # package name on these GOOS-suffixed files. go build/vet/test all pass.
      - path: 'internal/transport/socket_umask_(unix|windows)\.go$'
        linters:
          - typecheck
      # ─── lll exclusions ────────────────────────────────────────────────
      # The lll linter enforces a 120-char line cap so two-pane diffs stay
      # readable. The exclusions below cover content where breaking the
      # line would change behavior or hurt clarity, not casual sprawl in
      # regular code.
      # Bench fixtures: deliberately long HTML/markdown lines exercising
      # the htmlmd compactor end-to-end. Splitting them changes the input.
      - path: cmd/dfmt-bench/tokensaving\.go$
        linters:
          - lll
      # MCP wire-format string constants: agent-facing tool descriptions
      # consumed by Claude/Cursor/etc. as a single MCP `description` field.
      # Splitting them inserts whitespace into the wire protocol output.
      - path: internal/transport/mcp\.go$
        linters:
          - lll
      # Doctor / dispatch human-readable output: full-sentence printf
      # messages with embedded paths (`C:\Program Files\...`). Splitting
      # them breaks the output formatting agents see.
      - path: internal/cli/dispatch\.go$
        linters:
          - lll
      # Project-init scripts: PowerShell / bash one-liners injected into
      # SessionStart hooks. They run as a single shell command — newlines
      # would terminate the statement.
      - path: internal/setup/projectinit\.go$
        linters:
          - lll
      # Sandbox error templates: structured "operation denied by policy"
      # messages with hint suffix; one-line form is contractual (the
      # `policyDenyHint(...)` line break is part of the response shape).
      - path: internal/sandbox/permissions\.go$
        linters:
          - lll
      # FSWatch SetProject doc comment: full single-sentence godoc that
      # narrowly explains both the optional and the populated case.
      - path: internal/capture/fswatch\.go$
        linters:
          - lll
      # Long error prose with embedded URLs and identifiers. Each is the
      # primary user-facing error message for that path.
      - path: internal/transport/(handlers|http)\.go$
        linters:
          - lll
      # `streamFile` signature carries five parameters with descriptive
      # names — splitting the prototype hurts go-doc readability.
      - path: internal/core/journal\.go$
        linters:
          - lll
      # Daemon root-warn message: single warning line surfaced once at
      # startup; agents log it verbatim.
      - path: internal/daemon/daemon\.go$
        linters:
          - lll
      # Test files: assertion `t.Errorf` lines and table fixtures often
      # exceed 120; readability of one-line failures wins.
      - path: _test\.go$
        linters:
          - lll
      # ─── errcheck: more best-effort defer/Close patterns ───────────────
      - path: internal/config/config\.go$
        linters:
          - errcheck
        source: 'defer f\.Close\('
      - path: internal/content/store\.go$
        linters:
          - errcheck
        source: '(f|gz)\.Close\('
      - path: internal/daemon/process_windows\.go$
        linters:
          - errcheck
        source: 'syscall\.CloseHandle\('
      - path: internal/logging/log\.go$
        linters:
          - errcheck
        source: 'fmt\.Fprintf\('
      - path: internal/sandbox/permissions\.go$
        linters:
          - errcheck
        source: 'defer f\.Close\('
      - path: internal/setup/setup\.go$
        linters:
          - errcheck
        source: 'defer f\.Close\('
      # run-go-mod-tidy.go: build-time helper, not part of the binary.
      - path: run-go-mod-tidy\.go$
        linters:
          - errcheck
      # ─── goconst: handlers.go layer-name literals ──────────────────────
      # `bm25` / `trigram` / `raw` are wire-protocol values returned in
      # search responses; extracting them as constants would require
      # exporting the alphabet. The repetition is intentional API surface.
      - path: internal/transport/handlers\.go$
        linters:
          - goconst
      # ─── goconst: htmlmd.go HTML tag literals ──────────────────────────
      # `pre` and other HTML tag names appear in stack/serializer paths;
      # extracting them spreads them across files for no reader benefit.
      - path: internal/sandbox/htmlmd\.go$
        linters:
          - goconst
      # ─── goconst: permissions.go op-name literal ───────────────────────
      # `exec` appears in both error-message templates and policy match
      # arms; extracting drives indirection without clarity gain.
      - path: internal/sandbox/permissions\.go$
        linters:
          - goconst
      # ─── goconst: capture FS event-type literals ───────────────────────
      # `create` / `modify` / `delete` appear in the cross-platform
      # fswatch.go switch and the per-OS fswatch_(linux|windows).go event
      # producers. They are FS event-type names mirroring inotify /
      # ReadDirectoryChangesW operations; reading them as literals is what
      # one expects when grepping for `case "create":`. Linux build sees
      # an extra file (fswatch_linux.go) so the count crosses the goconst
      # threshold there but not on Windows.
      - path: internal/capture/fswatch(_linux|_windows)?\.go$
        linters:
          - goconst
      # ─── gocritic: registry_test.go path-literal ───────────────────────
      # Test deliberately uses `/proj/seed-N` (a virtual path that never
      # resolves on disk); filepathJoin's warning is a false positive
      # since we never actually filesystem-touch the value.
      - path: internal/client/registry_test\.go$
        linters:
          - gocritic

# golangci-lint v2 schema: `issues` and `formatters` are top-level blocks.
# The pre-v0.2.0 layout nested them under a `lint:` parent that v2 rejects
# with `additional properties 'lint' not allowed`. v2.4.0 uncovered the
# drift; the old `latest` pin masked it.
issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
